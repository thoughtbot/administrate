search:
  paths:
    - "app/controllers"
    - "app/helpers"
    - "app/pages"
    - "app/views"

data:
  read:
    - config/locales/administrate.%{locale}.yml

ignore_unused:
  - activerecord.*
  - administrate.*
  - date.*
  - simple_form.*
  - time.*
  - titles.*

ignore_missing: # Temporarily ignore missing keys until development is complete
  - administrate.fields.active_storage.attachment
  - administrate.fields.active_storage.no_attachment

